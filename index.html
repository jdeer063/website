<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulupandan Water District - Water Billing System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared/common.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
</head>

<body>
    <div class="immersive-wrapper">
        <div class="wave-background">
            <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
                viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
                <defs>
                    <path id="gentle-wave"
                        d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
                </defs>
                <g class="parallax">
                    <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(2, 136, 209, 0.4)" />
                    <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(2, 136, 209, 0.3)" />
                    <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(2, 136, 209, 0.2)" />
                    <use xlink:href="#gentle-wave" x="48" y="7" fill="rgba(2, 136, 209, 0.1)" />
                </g>
            </svg>
        </div>
        <div class="container">
            <div class="login-card">
                <div class="brand-internal">
                    <div class="logo-wrapper">
                        <img src="assets/logo.png" alt="PWD Logo" class="logo">
                    </div>
                    <h1>Pulupandan Water District</h1>
                    <p>Administrative Portal</p>
                </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Username or Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <circle cx="9" cy="5" r="3" stroke="currentColor" stroke-width="1.5" />
                            <path d="M3 16C3 12.6863 5.68629 10 9 10C12.3137 10 15 12.6863 15 16" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" />
                        </svg>
                        <input type="text" id="email" name="username" class="form-input" placeholder="Enter your username or email" autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <rect x="3" y="7" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5" />
                            <path d="M6 7V5C6 3.34315 7.34315 2 9 2C10.6569 2 12 3.34315 12 5V7" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" />
                            <circle cx="9" cy="11.5" r="1" fill="currentColor" />
                        </svg>
                        <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password"
                            autocomplete="current-password" required>
                        <button type="button" class="password-toggle" id="passwordToggle"
                            aria-label="Toggle password visibility">
                            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                                <path d="M1 9C1 9 4 3 9 3C14 3 17 9 17 9C17 9 14 15 9 15C4 15 1 9 1 9Z"
                                    stroke="currentColor" stroke-width="1.5" />
                                <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-footer">
                    <div class="remember-me-group">
                        <input type="checkbox" id="rememberMe" class="remember-checkbox">
                        <label for="rememberMe">Remember me</label>
                    </div>
                    <button type="button" class="forgot-link" id="forgotPasswordBtn">Forgot password?</button>
                </div>



                <button type="submit" class="submit-btn">
                    <span>Sign In</span>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </form>

        </div>

        <!-- Forgot Password Modal -->
        <!-- Multi-Step Recovery Modal -->
        <div class="modal-overlay" id="forgotPasswordModal">
            <div class="modal-card">
                <!-- Step 1: Email Input -->
                <div id="recoveryStep1">
                    <div class="modal-header">
                        <h2>Forgot Password</h2>
                        <p>Enter your email to receive a 6-digit verification code.</p>
                    </div>
                    <form id="forgotPasswordForm">
                        <div class="form-group">
                            <label for="recoveryEmail">Email Address</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
                                    <path d="M3 4H15C15.55 4 16 4.45 16 5V13C16 13.55 15.55 14 15 14H3C2.45 14 2 13.55 2 13V5C2 4.45 2.45 4 3 4Z" stroke="currentColor" stroke-width="1.5" />
                                    <path d="M2 5L9 10L16 5" stroke="currentColor" stroke-width="1.5" />
                                </svg>
                                <input type="email" id="recoveryEmail" class="form-input" placeholder="Enter your email" required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn-cancel" onclick="closeForgotPassword()">
                                <i class="fas fa-chevron-left"></i> Back
                            </button>
                            <button type="submit" class="submit-btn" id="sendCodeBtn">
                                <span>Send Code</span>
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Step 2: Code Verification -->
                <div id="recoveryStep2" style="display: none;">
                    <div class="modal-header">
                        <h2>Verify Code</h2>
                        <p>We've sent a 6-digit code to <b id="displayEmail"></b></p>
                    </div>
                    <form id="verifyCodeForm">
                        <div class="form-group">
                            <label>Verification Code</label>
                            <div class="input-wrapper">
                                <input type="text" id="verificationCode" class="form-input" placeholder="000000" maxlength="6" style="text-align: center; font-size: 24px; letter-spacing: 8px; font-weight: 800;" required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn-cancel" onclick="showRecoveryStep(1)">
                                <i class="fas fa-chevron-left"></i> Change Email
                            </button>
                            <button type="submit" class="submit-btn" id="verifyBtn">
                                <span>Verify Code</span>
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Step 3: New Password -->
                <div id="recoveryStep3" style="display: none;">
                    <div class="modal-header">
                        <h2>Set New Password</h2>
                        <p>Your identity is verified. Please pick a new password.</p>
                    </div>
                    <form id="resetPasswordForm">
                        <div class="form-group">
                            <label for="newPass">New Password</label>
                            <div class="input-wrapper">
                                <input type="password" id="newPass" class="form-input" placeholder="At least 6 characters" required>
                                <button type="button" class="password-toggle" onclick="togglePasswordVisibility('newPass', this)">
                                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                                        <path d="M1 9C1 9 4 3 9 3C14 3 17 9 17 9C17 9 14 15 9 15C4 15 1 9 1 9Z" stroke="currentColor" stroke-width="1.5" />
                                        <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="confirmNewPass">Confirm Password</label>
                            <div class="input-wrapper">
                                <input type="password" id="confirmNewPass" class="form-input" placeholder="Confirm your password" required>
                                <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirmNewPass', this)">
                                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                                        <path d="M1 9C1 9 4 3 9 3C14 3 17 9 17 9C17 9 14 15 9 15C4 15 1 9 1 9Z" stroke="currentColor" stroke-width="1.5" />
                                        <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="submit" class="submit-btn" id="savePassBtn">
                                <span>Update Password</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Pulupandan Water District.</p>
        </footer>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("0XD8wCzHIuhhtzt-b");
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="shared/utils.js"></script>
    <script src="script.js"></script>
</body>

</html>
